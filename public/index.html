<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photos</title>
  <link rel="stylesheet" href="./vendor/photoswipe.css">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header id="toolbar">
    <span id="photo-count">Photos</span>
    <div id="zoom-control">
      <span class="zoom-icon">-</span>
      <input type="range" id="zoom-slider" min="0" max="100" step="1" value="12">
      <span class="zoom-icon">+</span>
    </div>
    <button id="rescan-btn" title="Rescan photo library">&#8635;</button>
    <button id="nav-toggle" title="Timeline">&#9776;</button>
    <a href="/logout" id="logout-btn" title="Sign out" style="background:none;border:none;color:#666;font-size:18px;cursor:pointer;padding:4px 8px;text-decoration:none;line-height:1" title="Sign out">⏻</a>
  </header>

  <main id="gallery"></main>

  <nav id="timeline-nav" class="hidden">
    <div id="timeline-content"></div>
  </nav>
  <div id="timeline-backdrop" class="hidden"></div>

  <div id="scroll-indicator" class="hidden"></div>

  <!-- Film strip overlay (shown when PhotoSwipe lightbox is open) -->
  <div id="film-strip" class="hidden"></div>

  <!-- Metadata panel overlay -->
  <div id="meta-panel" class="hidden">
    <div id="meta-content"></div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
