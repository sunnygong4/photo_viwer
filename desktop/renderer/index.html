<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; img-src 'self' data: blob: https: scloud-thumb:; style-src 'self' 'unsafe-inline';">
  <title>sCloud</title>
  <link rel="stylesheet" href="./vendor/photoswipe.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="toolbar">
    <span id="photo-count">sCloud</span>
    <div id="zoom-control">
      <span class="zoom-icon">-</span>
      <input type="range" id="zoom-slider" min="0" max="100" step="1" value="12">
      <span class="zoom-icon">+</span>
    </div>
    <button id="sync-btn" title="Sync P:\Photos → Z:\Photos">&#8645;</button>
    <button id="settings-btn" title="Settings">&#9881;</button>
    <button id="nav-toggle" title="Timeline">&#9776;</button>
  </header>

  <main id="gallery"></main>

  <nav id="timeline-nav" class="hidden">
    <div id="timeline-content"></div>
  </nav>
  <div id="timeline-backdrop" class="hidden"></div>

  <div id="scroll-indicator" class="hidden"></div>

  <!-- sCloud Settings panel -->
  <div id="settings-panel" class="hidden">
    <div id="settings-backdrop"></div>
    <div id="settings-content">
      <h2>&#9881; sCloud Settings</h2>
      <label>Server URL</label>
      <div class="settings-row">
        <input type="text" id="server-url-input" placeholder="https://photos.sunnygong.com">
        <button id="save-url-btn">Save</button>
      </div>
      <div id="connection-status"></div>
      <hr>
      <label>Thumbnail Cache</label>
      <div id="cache-stats">Loading...</div>
      <div class="settings-row">
        <button id="open-cache-btn">Open Folder</button>
        <button id="clear-cache-btn">Clear Cache</button>
      </div>
      <hr>
      <button id="close-settings-btn">Close</button>
    </div>
  </div>

  <!-- Sync / SSH Settings panel -->
  <div id="ssh-settings-panel" class="hidden">
    <div id="ssh-settings-backdrop"></div>
    <div id="ssh-settings-content">
      <h2>&#8645; Sync Settings</h2>

      <label>Server Address</label>
      <div class="ssh-field-row">
        <div class="ssh-field">
          <div class="ssh-field-label">IP / Hostname</div>
          <input type="text" id="ssh-host" placeholder="100.72.90.36">
        </div>
        <div class="ssh-field ssh-field-sm">
          <div class="ssh-field-label">Port</div>
          <input type="text" id="ssh-port" placeholder="22">
        </div>
      </div>

      <label style="margin-top:14px">Login</label>
      <div class="ssh-field-row">
        <div class="ssh-field">
          <div class="ssh-field-label">Username</div>
          <input type="text" id="ssh-user" placeholder="host">
        </div>
        <div class="ssh-field">
          <div class="ssh-field-label">Password</div>
          <input type="password" id="ssh-password" placeholder="••••••••">
        </div>
      </div>
      <div class="settings-label-small">Password auth takes priority. Leave blank to use private key instead.</div>

      <label style="margin-top:14px">Private Key <span style="font-weight:normal;color:#666">(only if no password)</span></label>
      <div class="ssh-field-row">
        <div class="ssh-field">
          <div class="ssh-field-label">Key file path</div>
          <input type="text" id="ssh-key" placeholder="C:\Users\you\.ssh\id_rsa">
        </div>
      </div>

      <label style="margin-top:14px">Remote Path</label>
      <div class="ssh-field-row">
        <div class="ssh-field">
          <div class="ssh-field-label">Photos root on server</div>
          <input type="text" id="ssh-remote-path" placeholder="/mnt/nas/Photos">
        </div>
      </div>

      <div class="settings-row" style="margin-top:16px">
        <button id="ssh-save-btn">Save</button>
        <button id="ssh-test-btn">Test Connection</button>
      </div>
      <div id="ssh-status"></div>
      <hr>
      <button id="close-ssh-settings-btn">Close</button>
    </div>
  </div>

  <!-- Film strip overlay (shown when PhotoSwipe lightbox is open) -->
  <div id="film-strip" class="hidden"></div>

  <!-- Metadata panel overlay -->
  <div id="meta-panel" class="hidden">
    <div id="meta-content"></div>
  </div>

  <!-- Sync panel -->
  <div id="sync-panel" class="hidden">
    <div id="sync-backdrop"></div>
    <div id="sync-content">
      <div id="sync-header">
        <div>
          <h2>&#8645; Sync Photos</h2>
          <div id="sync-paths">P:\Photos &rarr; Z:\Photos</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          <button id="sync-ssh-settings-btn" title="SSH / SFTP Settings" style="background:#1e2a3a;border:1px solid #2a4060;border-radius:6px;color:#90caf9;font-size:13px;padding:5px 10px;cursor:pointer">&#9881; SSH</button>
          <button id="sync-close-btn" class="sync-close-btn">&#10005;</button>
        </div>
      </div>
      <div id="sync-summary"></div>
      <div id="sync-table-wrap">
        <table id="sync-table">
          <thead>
            <tr>
              <th class="col-toggle"></th>
              <th class="col-month">Month</th>
              <th class="col-local">Local (P:\)</th>
              <th class="col-server">Server (Z:\)</th>
              <th class="col-action"></th>
            </tr>
          </thead>
          <tbody id="sync-table-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="bridge.js"></script>
  <script src="app.js"></script>
  <script src="settings.js"></script>
  <script src="sync.js"></script>
</body>
</html>
